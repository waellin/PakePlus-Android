<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car Detection - Computer Vision</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
    h1 { margin-bottom: 8px; font-size: 1.5rem; }
    p { font-size: 0.85rem; color: #aaa; margin-bottom: 16px; }
    #upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
    #upload-wrapper input { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    #upload-btn { display: inline-block; padding: 10px 24px; background: #3b82f6; color: #fff; border-radius: 8px; font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; }
    #status { margin: 12px 0; font-size: 0.85rem; color: #888; min-height: 1.2em; }
    #container { position: relative; display: inline-block; max-width: 100%; }
    #image, #canvas { display: block; max-width: 100%; max-height: 80vh; }
    #canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>Car Detection</h1>
  <p>Edge-detection + contour analysis — fully offline, no dependencies</p>

  <div id="upload-wrapper">
    <button id="upload-btn">Choose Image</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>
  <div id="status">Choose an image to begin</div>

  <div id="container" class="hidden">
    <img id="image" src="">
    <canvas id="canvas"></canvas>
  </div>

  <script>
    function detectCars(imgData, width, height) {
      const data = imgData.data;
      const gray = new Uint8Array(width * height);
      const edges = new Uint8Array(width * height);

      // 1. Grayscale
      for (let i = 0; i < width * height; i++) {
        const p = i * 4;
        gray[i] = (data[p] * 0.3 + data[p + 1] * 0.59 + data[p + 2] * 0.11) | 0;
      }

      // 2. Sobel edge detection with hysteresis thresholding
      const gx = new Int16Array(width * height);
      const gy = new Int16Array(width * height);
      const mag = new Uint16Array(width * height);

      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const idx = y * width + x;
          gx[idx] = (-1 * gray[idx - width - 1] + 1 * gray[idx - width + 1] +
                     -2 * gray[idx - 1]      + 2 * gray[idx + 1] +
                     -1 * gray[idx + width - 1] + 1 * gray[idx + width + 1]);
          gy[idx] = (-1 * gray[idx - width - 1] + -2 * gray[idx - width] + -1 * gray[idx - width + 1] +
                      1 * gray[idx + width - 1] +  2 * gray[idx + width] +  1 * gray[idx + width + 1]);
          mag[idx] = Math.sqrt(gx[idx] * gx[idx] + gy[idx] * gy[idx]) | 0;
        }
      }

      // Adaptive threshold
      let sum = 0, count = 0;
      for (let i = 0; i < mag.length; i++) {
        if (mag[i] > 0) { sum += mag[i]; count++; }
      }
      const meanMag = count > 0 ? sum / count : 30;
      const highThreshold = meanMag * 1.5;
      const lowThreshold = highThreshold * 0.4;

      // Non-maximum suppression
      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const idx = y * width + x;
          const angle = Math.atan2(gy[idx], gx[idx]) * 180 / Math.PI;
          let q = 0, r = 0;

          if ((angle >= -22.5 && angle < 22.5) || (angle >= 157.5 || angle < -157.5)) {
            q = mag[idx - 1]; r = mag[idx + 1];
          } else if ((angle >= 22.5 && angle < 67.5) || (angle >= -157.5 && angle < -112.5)) {
            q = mag[idx + width - 1]; r = mag[idx - width + 1];
          } else if ((angle >= 67.5 && angle < 112.5) || (angle >= -112.5 && angle < -67.5)) {
            q = mag[idx - width]; r = mag[idx + width];
          } else {
            q = mag[idx - width - 1]; r = mag[idx + width + 1];
          }

          if (mag[idx] >= q && mag[idx] >= r) {
            edges[idx] = mag[idx] >= highThreshold ? 255 : (mag[idx] >= lowThreshold ? 128 : 0);
          }
        }
      }

      // 3. Edge tracing to find contours (simple flood-fill)
      const visited = new Uint8Array(width * height);
      const contours = [];

      for (let y = 1; y < height - 1; y++) {
        for (let x = 1; x < width - 1; x++) {
          const idx = y * width + x;
          if (edges[idx] === 255 && !visited[idx]) {
            const pts = traceContour(edges, visited, width, height, x, y);
            if (pts.length > 20) {
              const bbox = getBoundingBox(pts);
              contours.push(bbox);
            }
          }
        }
      }

      // 4. Filter contours by car-like aspect ratio and size
      const cars = [];
      const imgArea = width * height;

      for (const b of contours) {
        const cw = b.x2 - b.x1;
        const ch = b.y2 - b.y1;
        const area = cw * ch;
        const aspect = cw / ch;

        // Cars typically: aspect ratio 1.2-2.5, area > 2% of image
        if (aspect > 1.1 && aspect < 3.0 && area > imgArea * 0.005 && cw > 30 && ch > 20) {
          // Check if there's enough edge density in the region
          const density = edgeDensity(edges, width, height, b.x1, b.y1, cw, ch);
          if (density > 0.1) {
            cars.push({ x: b.x1, y: b.y1, w: cw, h: ch, aspect, area, density });
          }
        }
      }

      // 5. Merge overlapping detections
      return mergeOverlaps(cars);
    }

    function traceContour(edges, visited, w, h, sx, sy) {
      const pts = [];
      const stack = [[sx, sy]];

      while (stack.length > 0) {
        const [x, y] = stack.pop();
        const idx = y * w + x;
        if (x < 0 || x >= w || y < 0 || y >= h) continue;
        if (visited[idx]) continue;
        if (edges[idx] !== 255) continue;

        visited[idx] = 1;
        pts.push([x, y]);

        stack.push([x - 1, y], [x + 1, y], [x, y - 1], [x, y + 1]);
        stack.push([x - 1, y - 1], [x + 1, y - 1], [x - 1, y + 1], [x + 1, y + 1]);
      }

      return pts;
    }

    function getBoundingBox(pts) {
      let x1 = Infinity, y1 = Infinity, x2 = -Infinity, y2 = -Infinity;
      for (const [x, y] of pts) {
        if (x < x1) x1 = x;
        if (y < y1) y1 = y;
        if (x > x2) x2 = x;
        if (y > y2) y2 = y;
      }
      return { x1, y1, x2, y2 };
    }

    function edgeDensity(edges, w, h, x, y, cw, ch) {
      let edgeCount = 0, total = 0;
      const x1 = Math.max(0, x), y1 = Math.max(0, y);
      const x2 = Math.min(w - 1, x + cw), y2 = Math.min(h - 1, y + ch);
      for (let row = y1; row <= y2; row++) {
        for (let col = x1; col <= x2; col++) {
          if (edges[row * w + col] > 0) edgeCount++;
          total++;
        }
      }
      return total > 0 ? edgeCount / total : 0;
    }

    function mergeOverlaps(boxes) {
      if (boxes.length === 0) return boxes;

      boxes.sort((a, b) => b.area - a.area);
      const merged = [];
      const used = new Uint8Array(boxes.length);

      for (let i = 0; i < boxes.length; i++) {
        if (used[i]) continue;
        let cx = boxes[i].x, cy = boxes[i].y;
        let cx2 = boxes[i].x + boxes[i].w, cy2 = boxes[i].y + boxes[i].h;
        used[i] = 1;

        for (let j = i + 1; j < boxes.length; j++) {
          if (used[j]) continue;
          const ox = Math.max(cx, boxes[j].x);
          const oy = Math.max(cy, boxes[j].y);
          const ox2 = Math.min(cx2, boxes[j].x + boxes[j].w);
          const oy2 = Math.min(cy2, boxes[j].y + boxes[j].h);

          if (ox < ox2 && oy < oy2) {
            const overlapArea = (ox2 - ox) * (oy2 - oy);
            const areaB = boxes[j].w * boxes[j].h;
            const minArea = Math.min(boxes[i].area, areaB);
            if (overlapArea / minArea > 0.3) {
              cx = Math.min(cx, boxes[j].x);
              cy = Math.min(cy, boxes[j].y);
              cx2 = Math.max(cx2, boxes[j].x + boxes[j].w);
              cy2 = Math.max(cy2, boxes[j].y + boxes[j].h);
              used[j] = 1;
            }
          }
        }

        merged.push({ x: cx, y: cy, w: cx2 - cx, h: cy2 - cy });
      }

      return merged;
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const img = document.getElementById('image');
      const container = document.getElementById('container');
      const canvas = document.getElementById('canvas');
      const status = document.getElementById('status');

      img.src = URL.createObjectURL(file);
      await img.decode();

      container.classList.remove('hidden');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      status.textContent = 'Analyzing...';

      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const cars = detectCars(imgData, canvas.width, canvas.height);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);

      for (const car of cars) {
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 3;
        ctx.strokeRect(car.x, car.y, car.w, car.h);

        ctx.fillStyle = '#22c55e';
        const label = `car?  ${(car.w * car.h / (canvas.width * canvas.height) * 100).toFixed(1)}%`;
        ctx.font = 'bold 14px system-ui, sans-serif';
        const tw = ctx.measureText(label).width;
        ctx.fillRect(car.x, car.y - 24, tw + 12, 24);
        ctx.fillStyle = '#000';
        ctx.fillText(label, car.x + 6, car.y - 7);
      }

      status.textContent = `Found ${cars.length} car-like object(s)`;
    });
  </script>
</body>
</html>
