<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOLO Car Detection</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
    h1 { margin-bottom: 4px; font-size: 1.5rem; }
    p { font-size: 0.8rem; color: #888; margin-bottom: 12px; }
    #upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
    #upload-wrapper input { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    #upload-btn { display: inline-block; padding: 10px 24px; background: #3b82f6; color: #fff; border-radius: 8px; font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; }
    #status { margin: 8px 0; font-size: 0.85rem; color: #888; min-height: 1.2em; white-space: pre-wrap; text-align: center; max-width: 600px; }
    #container { position: relative; display: inline-block; max-width: 100%; }
    #image, #canvas { display: block; max-width: 100%; max-height: 80vh; }
    #canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
    .hidden { display: none !important; }
    #info { font-size: 0.75rem; color: #555; margin-top: 8px; }
    #progress-bar { width: 300px; height: 6px; background: #333; border-radius: 3px; margin: 8px 0; overflow: hidden; }
    #progress-fill { height: 100%; width: 0%; background: #3b82f6; border-radius: 3px; transition: width 0.3s; }
  </style>
</head>
<body>
  <h1>YOLO Car Detection</h1>
  <p>YOLO11 nano — optimized for edge devices</p>

  <div id="upload-wrapper">
    <button id="upload-btn">Choose Image</button>
    <input type="file" id="fileInput" accept="image/*">
  </div>
  <div id="progress-bar" class="hidden"><div id="progress-fill"></div></div>
  <div id="status">Loading model...</div>
  <div id="info"></div>

  <div id="container" class="hidden">
    <img id="image" src="">
    <canvas id="canvas"></canvas>
  </div>

  <script src="lib/ort.umd.min.js"></script>
  <script src="lib/model-data.js"></script>
  <script>
    const COCO_CLASSES = ['person','bicycle','car','motorcycle','airplane','bus','train','truck','boat','traffic light','fire hydrant','stop sign','parking meter','bench','bird','cat','dog','horse','sheep','cow','elephant','bear','zebra','giraffe','backpack','umbrella','handbag','tie','suitcase','frisbee','skis','snowboard','sports ball','kite','baseball bat','baseball glove','skateboard','surfboard','tennis racket','bottle','wine glass','cup','fork','knife','spoon','bowl','banana','apple','sandwich','orange','broccoli','carrot','hot dog','pizza','donut','cake','chair','couch','potted plant','bed','dining table','toilet','tv','laptop','mouse','remote','keyboard','cell phone','microwave','oven','toaster','sink','refrigerator','book','clock','vase','scissors','teddy bear','hair drier','toothbrush'];
    const INPUT_SIZE = 640;
    const CONF_THRESHOLD = 0.5;
    const IOU_THRESHOLD = 0.45;

    let session;
    const statusEl = document.getElementById('status');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const infoEl = document.getElementById('info');

    function setProgress(pct) {
      progressFill.style.width = pct + '%';
    }

    async function init() {
      if (location.protocol === 'file:') {
        statusEl.textContent = 'Error: Open via HTTP server, not file://\n\nRun: npx http-server . -p 8080  then  open http://localhost:8080';
        return;
      }
      try {
        progressBar.classList.remove('hidden');
        statusEl.textContent = 'Loading ONNX Runtime...';
        setProgress(10);

        if (typeof ort === 'undefined') throw new Error('ONNX Runtime not loaded (ort is undefined)');

        setProgress(30);
        statusEl.textContent = 'Creating inference session...';

        session = await ort.InferenceSession.create(MODEL_DATA_URL, {
          executionProviders: ['webgl'],
          graphOptimizationLevel: 'all'
        });

        setProgress(100);
        setTimeout(() => progressBar.classList.add('hidden'), 400);
        statusEl.textContent = 'YOLO ready — choose an image to detect cars.';
      } catch (e) {
        progressBar.classList.add('hidden');
        statusEl.textContent = 'Error: ' + e.message;
        infoEl.textContent = 'Run: setup.ps1  then  npx http-server . -p 8080 -c-1';
      }
    }

    function sigmoid(x) { return 1 / (1 + Math.exp(-x)); }

    function nms(boxes, iouThreshold) {
      boxes.sort((a, b) => b.score - a.score);
      const result = [];
      const used = new Uint8Array(boxes.length);

      for (let i = 0; i < boxes.length; i++) {
        if (used[i]) continue;
        result.push(boxes[i]);
        for (let j = i + 1; j < boxes.length; j++) {
          if (used[j]) continue;
          const x1 = Math.max(boxes[i].x1, boxes[j].x1);
          const y1 = Math.max(boxes[i].y1, boxes[j].y1);
          const x2 = Math.min(boxes[i].x2, boxes[j].x2);
          const y2 = Math.min(boxes[i].y2, boxes[j].y2);
          if (x1 < x2 && y1 < y2) {
            const inter = (x2 - x1) * (y2 - y1);
            const areaI = (boxes[i].x2 - boxes[i].x1) * (boxes[i].y2 - boxes[i].y1);
            const areaJ = (boxes[j].x2 - boxes[j].x1) * (boxes[j].y2 - boxes[j].y1);
            if (inter / Math.min(areaI, areaJ) > iouThreshold) used[j] = 1;
          }
        }
      }
      return result;
    }

    function letterbox(img, targetSize) {
      const c = document.createElement('canvas');
      c.width = targetSize; c.height = targetSize;
      const ctx = c.getContext('2d');
      const scale = targetSize / Math.max(img.naturalWidth, img.naturalHeight);
      const newW = Math.round(img.naturalWidth * scale);
      const newH = Math.round(img.naturalHeight * scale);
      const dx = Math.round((targetSize - newW) / 2);
      const dy = Math.round((targetSize - newH) / 2);
      ctx.fillStyle = '#808080';
      ctx.fillRect(0, 0, targetSize, targetSize);
      ctx.drawImage(img, dx, dy, newW, newH);
      return { canvas: c, scale, padX: dx, padY: dy, newW, newH };
    }

    function parseYOLOOutput(data, shape, scale, padX, padY, origW, origH) {
      const numBoxes = shape[2];
      const features = shape[1];
      const boxes = [];

      for (let i = 0; i < numBoxes; i++) {
        const cx = data[i];
        const cy = data[numBoxes + i];
        const w = data[numBoxes * 2 + i];
        const h = data[numBoxes * 3 + i];

        let maxScore = 0, maxId = -1;
        for (let j = 4; j < features; j++) {
          const score = sigmoid(data[j * numBoxes + i]);
          if (score > maxScore) { maxScore = score; maxId = j - 4; }
        }

        if (maxScore >= CONF_THRESHOLD) {
          const x1 = Math.max(0, ((cx - w / 2) * INPUT_SIZE - padX) / scale);
          const y1 = Math.max(0, ((cy - h / 2) * INPUT_SIZE - padY) / scale);
          const x2 = Math.min(origW, ((cx + w / 2) * INPUT_SIZE - padX) / scale);
          const y2 = Math.min(origH, ((cy + h / 2) * INPUT_SIZE - padY) / scale);
          boxes.push({ x1, y1, x2, y2, score: maxScore, classId: maxId, className: COCO_CLASSES[maxId] });
        }
      }
      return nms(boxes, IOU_THRESHOLD);
    }

    document.getElementById('fileInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file || !session) return;

      const img = document.getElementById('image');
      const container = document.getElementById('container');
      const canvas = document.getElementById('canvas');

      img.src = URL.createObjectURL(file);
      await img.decode();

      container.classList.remove('hidden');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;

      statusEl.textContent = 'Preprocessing...';

      const { canvas: resized, scale, padX, padY } = letterbox(img, INPUT_SIZE);
      const ctx = resized.getContext('2d');
      const imageData = ctx.getImageData(0, 0, INPUT_SIZE, INPUT_SIZE);
      const pixels = imageData.data;

      // NCHW: R plane, G plane, B plane
      const totalPixels = INPUT_SIZE * INPUT_SIZE;
      const input = new Float32Array(3 * totalPixels);
      for (let i = 0; i < totalPixels; i++) {
        input[i] = pixels[i * 4] / 255;
        input[totalPixels + i] = pixels[i * 4 + 1] / 255;
        input[2 * totalPixels + i] = pixels[i * 4 + 2] / 255;
      }

      statusEl.textContent = 'Running YOLOv8 inference...';
      const startTime = performance.now();

      const inputTensor = new ort.Tensor('float32', input, [1, 3, INPUT_SIZE, INPUT_SIZE]);
      const results = await session.run({ images: inputTensor });

      // Get first output
      const outputKeys = Object.keys(results);
      const output = results[outputKeys[0]];
      const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);

      statusEl.textContent = 'Post-processing...';
      const detections = parseYOLOOutput(output.data, output.dims, scale, padX, padY, img.naturalWidth, img.naturalHeight);
      const cars = detections.filter(d => d.classId === 2);

      const outCtx = canvas.getContext('2d');

      for (const d of detections) {
        const isCar = d.classId === 2;
        outCtx.strokeStyle = isCar ? '#22c55e' : '#6b7280';
        outCtx.lineWidth = isCar ? 3 : 1;
        outCtx.strokeRect(d.x1, d.y1, d.x2 - d.x1, d.y2 - d.y1);

        outCtx.fillStyle = isCar ? '#22c55e' : '#6b7280';
        const label = `${d.className} ${Math.round(d.score * 100)}%`;
        outCtx.font = 'bold 14px system-ui, sans-serif';
        const tw = outCtx.measureText(label).width;
        outCtx.fillRect(d.x1, d.y1 - 22, tw + 8, 22);
        outCtx.fillStyle = '#000';
        outCtx.fillText(label, d.x1 + 4, d.y1 - 6);
      }

      statusEl.textContent = `Detected ${cars.length} car(s), ${detections.length} total  (${elapsed}s)`;
      infoEl.textContent = `Input: ${img.naturalWidth}x${img.naturalHeight} → ${INPUT_SIZE}x${INPUT_SIZE}  |  scale: ${scale.toFixed(3)}`;
    });

    init();
  </script>
</body>
</html>
